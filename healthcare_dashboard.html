<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #0056b3;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        .tab-button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            outline: none;
            transition: background-color 0.3s, color 0.3s;
            color: #555;
            border-bottom: 2px solid transparent;
        }
        .tab-button.active {
            color: #007bff;
            border-bottom: 2px solid #007bff;
        }
        .tab-content {
            display: none;
            padding: 20px 0;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: calc(100% - 22px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            transition: background-color 0.3s;
        }
        button.primary {
            background-color: #007bff;
            color: white;
        }
        button.primary:hover {
            background-color: #0056b3;
        }
        button.success {
            background-color: #28a745;
            color: white;
        }
        button.success:hover {
            background-color: #218838;
        }
        button.info {
            background-color: #17a2b8;
            color: white;
        }
        button.info:hover {
            background-color: #138496;
        }
        button.danger {
            background-color: #dc3545;
            color: white;
        }
        button.danger:hover {
            background-color: #c82333;
        }
        button.warning {
            background-color: #ffc107;
            color: #212529;
        }
        button.warning:hover {
            background-color: #e0a800;
        }
        .output-area {
            background-color: #e9ecef;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin-top: 20px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
        }
        .warning-message {
            color: orange;
            margin-top: 10px;
            font-weight: bold;
        }
        .error-message {
            color: red;
            margin-top: 10px;
            font-weight: bold;
        }
        #idInputLabel, #idInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="header" id="dashboardTitle">Healthcare Dashboard</h1>

        <div class="form-group">
            <label for="ageInput" id="ageLabel">Your Age:</label>
            <input type="number" id="ageInput" value="25" min="0" max="120">
        </div>

        <div class="form-group">
            <label for="roleInput" id="roleLabel">Your Role:</label>
            <select id="roleInput">
                <option value="Normal User">Normal User</option>
                <option value="Student">Student</option>
                <option value="Doctor">Doctor</option>
            </select>
        </div>

        <div class="form-group">
            <label for="idInput" id="idInputLabel">ID Number:</label>
            <input type="text" id="idInput" placeholder="Enter your ID number">
        </div>

        <div class="form-group">
            <label for="languageSelect" id="languageLabel">Language:</label>
            <select id="languageSelect">
                <option value="English">English</option>
                <option value="Amharic">Amharic</option>
            </select>
        </div>

        <div class="tabs">
            <button class="tab-button active" data-tab="predict" id="predictTabBtn">Disease Predictor</button>
            <button class="tab-button" data-tab="recommend" id="recommendTabBtn">Health Recommender</button>
            <button class="tab-button" data-tab="chat" id="chatbotTabBtn">Healthcare Chatbot</button>
        </div>

        <div id="predict" class="tab-content active">
            <div class="form-group">
                <label for="predictInput" id="predictInputLabel">Enter symptoms separated by commas:</label>
                <input type="text" id="predictInput" placeholder="e.g. headache, vomiting">
            </div>
            <button class="primary" id="predictBtn">Predict & Recommend</button>
            <button class="danger" id="predictClearBtn">Clear</button>
            <div class="output-area" id="predictOutput"></div>
        </div>

        <div id="recommend" class="tab-content">
            <div class="form-group">
                <label for="recInput" id="recInputLabel">Select a disease to see the full health plan:</label>
                <select id="recInput"></select>
            </div>
            <button class="success" id="recBtn">Get Plan</button>
            <button class="danger" id="recClearBtn">Clear</button>
            <div class="output-area" id="recOutput"></div>
        </div>

        <div id="chat" class="tab-content">
            <div class="form-group">
                <label for="chatInput" id="chatInputLabel">Ask health-related questions:</label>
                <input type="text" id="chatInput" placeholder="e.g. Tell me about Asthma diet">
            </div>
            <button class="info" id="chatBtn">Ask Bot</button>
            <button class="danger" id="chatClearBtn">Clear</button>
            <div class="output-area" id="chatOutput"></div>
        </div>
        <button class="warning" id="clearAllBtn">Clear All</button>

        <p class="warning-message" id="disclaimer">Disclaimer: Always consult a doctor before taking any medication or if you have severe symptoms. This system provides general information and should not replace professional medical advice.</p>

    </div>

    <script>
        // IMPORTANT: Replace this with your actual ngrok URL from the Flask API cell output.
        // Example: const API_BASE_URL = 'https://your-ngrok-url.ngrok-free.dev';
        const API_BASE_URL = 'YOUR_NGROK_URL'; // <<<=== UPDATE THIS LINE ===>>>

        let currentTranslations = {};
        let englishDiseaseNames = [];
        let amharicDiseaseNamesMap = {}; // {english_name: amharic_name}

        const elementsToTranslate = {
            dashboardTitle: 'Healthcare Dashboard',
            ageLabel: 'Your Age:',
            roleLabel: 'Your Role:',
            idInputLabel: 'ID Number:',
            idInputPlaceholder: 'Enter your ID number',
            languageLabel: 'Language:',
            predictTabBtn: 'Disease Predictor',
            recommendTabBtn: 'Health Recommender',
            chatbotTabBtn: 'Healthcare Chatbot',
            predictInputLabel: 'Enter symptoms separated by commas:',
            predictInputPlaceholder: 'e.g. headache, vomiting',
            predictBtn: 'Predict & Recommend',
            predictClearBtn: 'Clear',
            recInputLabel: 'Select a disease to see the full health plan:',
            recBtn: 'Get Plan',
            recClearBtn: 'Clear',
            chatInputLabel: 'Ask health-related questions:',
            chatInputPlaceholder: 'e.g. Tell me about Asthma diet',
            chatBtn: 'Ask Bot',
            chatClearBtn: 'Clear',
            clearAllBtn: 'Clear All',
            disclaimer: 'medical_advice_disclaimer',
            // Keys for disease info
            Disease: 'Disease',
            Description: 'Description',
            Symptoms: 'Symptoms',
            'Dietary Plan': 'Dietary Plan',
            Medications: 'Medications',
            'Workout/Activity': 'Workout/Activity',
            Precautions: 'Precautions',
            // Messages
            'Access Denied: Information is not available for users under 18.': 'Access Denied: Information is not available for users under 18.',
            'Access Denied: Invalid ID for Student role.': 'Access Denied: Invalid ID for Student role.',
            'Access Denied: Invalid ID for Doctor role.': 'Access Denied: Invalid ID for Doctor role.',
            'Please enter symptoms.': 'Please enter symptoms.',
            'Please enter a query.': 'Please enter a query.',
            'Hello! How can I help you with health information today?': 'Hello! How can I help you with health information today?',
            'I couldn\'t find specific information for that query. Please try asking about a specific disease (e.g., \'What is Asthma?\') or use the prediction system first.': 'I couldn\'t find specific information for that query. Please try asking about a specific disease (e.g., \'What is Asthma?\') or use the prediction system first.',
            'I couldn\'t recognize any specific symptoms in your input with the current similarity threshold. Please try different keywords or adjust the threshold.': 'I couldn\'t recognize any specific symptoms in your input with the current similarity threshold. Please try different keywords or adjust the threshold.'
        };

        async function fetchTranslations() {
            try {
                const response = await fetch(`${API_BASE_URL}/translations`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                currentTranslations = await response.json();
                console.log('Translations loaded:', currentTranslations);
            } catch (error) {
                console.error('Error fetching translations:', error);
                currentTranslations = {}; // Fallback to empty if fetch fails
            }
        }

        function translateText(key, currentLang) {
            if (currentLang === 'Amharic') {
                return currentTranslations[key] || key;
            }
            return key;
        }

        function updateUI(currentLang) {
            document.getElementById('dashboardTitle').textContent = translateText('Healthcare Dashboard', currentLang);

            document.getElementById('ageLabel').textContent = translateText('Your Age:', currentLang);
            document.getElementById('roleLabel').textContent = translateText('Your Role:', currentLang);
            document.getElementById('languageLabel').textContent = translateText('Language:', currentLang);
            document.getElementById('idInputLabel').textContent = translateText('ID Number:', currentLang);
            document.getElementById('idInput').placeholder = translateText('Enter your ID number', currentLang);

            document.getElementById('predictTabBtn').textContent = translateText('Disease Predictor', currentLang);
            document.getElementById('recommendTabBtn').textContent = translateText('Health Recommender', currentLang);
            document.getElementById('chatbotTabBtn').textContent = translateText('Healthcare Chatbot', currentLang);

            document.getElementById('predictInputLabel').textContent = translateText('Enter symptoms separated by commas:', currentLang);
            document.getElementById('predictInput').placeholder = translateText('e.g. headache, vomiting', currentLang);
            document.getElementById('predictBtn').textContent = translateText('Predict & Recommend', currentLang);
            document.getElementById('predictClearBtn').textContent = translateText('Clear', currentLang);

            document.getElementById('recInputLabel').textContent = translateText('Select a disease to see the full health plan:', currentLang);
            document.getElementById('recBtn').textContent = translateText('Get Plan', currentLang);
            document.getElementById('recClearBtn').textContent = translateText('Clear', currentLang);

            document.getElementById('chatInputLabel').textContent = translateText('Ask health-related questions:', currentLang);
            document.getElementById('chatInput').placeholder = translateText('e.g. Tell me about Asthma diet', currentLang);
            document.getElementById('chatBtn').textContent = translateText('Ask Bot', currentLang);
            document.getElementById('chatClearBtn').textContent = translateText('Clear', currentLang);

            document.getElementById('clearAllBtn').textContent = translateText('Clear All', currentLang);
            document.getElementById('disclaimer').textContent = translateText('medical_advice_disclaimer', currentLang);

            // Update recommender dropdown
            populateDiseaseDropdown();
        }

        async function fetchDiseaseNames() {
            try {
                const response = await fetch(`${API_BASE_URL}/diseases`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                englishDiseaseNames = await response.json();
                console.log('English disease names loaded:', englishDiseaseNames);
            } catch (error) {
                console.error('Error fetching English disease names:', error);
                englishDiseaseNames = [];
            }
        }

        async function fetchTranslatedDiseaseNames(currentLang) {
            if (currentLang === 'English') {
                amharicDiseaseNamesMap = {}; // Clear if English
                return;
            }
            try {
                const response = await fetch(`${API_BASE_URL}/translated_diseases`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ target_language: currentLang })
                });
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                amharicDiseaseNamesMap = await response.json();
                console.log('Translated disease names loaded:', amharicDiseaseNamesMap);
            } catch (error) {
                console.error('Error fetching translated disease names:', error);
                amharicDiseaseNamesMap = {};
            }
        }

        function populateDiseaseDropdown() {
            const recInput = document.getElementById('recInput');
            recInput.innerHTML = ''; // Clear existing options
            const currentLang = document.getElementById('languageSelect').value;

            const diseases = englishDiseaseNames;
            if (diseases.length === 0) return; // Wait for diseases to be loaded

            diseases.forEach(diseaseEn => {
                const option = document.createElement('option');
                option.value = diseaseEn; // Always store English value internally
                option.textContent = translateText(diseaseEn, currentLang); // Display translated name
                recInput.appendChild(option);
            });
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');

            document.querySelectorAll('.tab-button').forEach(button => {
                button.classList.remove('active');
            });
            document.querySelector(`.tab-button[data-tab="${tabId}"]`).classList.add('active');
        }

        function formatAsList(data, currentLang) {
            if (Array.isArray(data)) {
                return data.map(item => `  • ${translateText(item, currentLang)}`).join('\n');
            } else if (typeof data === 'string' && data.startsWith('[') && data.endsWith(']')) {
                try {
                    const arr = JSON.parse(data.replace(/'/g, '"')); // Simple attempt to parse stringified list
                    if (Array.isArray(arr)) {
                        return arr.map(item => `  • ${translateText(item, currentLang)}`).join('\n');
                    }
                } catch (e) { /* fall through */ }
            }
            return `  • ${translateText(data, currentLang)}`;
        }

        async function handleApiCall(endpoint, method, payload, outputElementId) {
            const outputArea = document.getElementById(outputElementId);
            outputArea.innerHTML = '';
            outputArea.classList.remove('error-message', 'warning-message');
            outputArea.textContent = 'Loading...';

            try {
                if (API_BASE_URL === 'YOUR_NGROK_URL') {
                    throw new Error('Please update API_BASE_URL in the HTML file with your ngrok URL.');
                }
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    outputArea.textContent = `Error: ${data.error || 'Something went wrong.'}`;
                    outputArea.classList.add('error-message');
                    console.error('API Error:', data);
                    return;
                }

                outputArea.textContent = ''; // Clear loading message
                const currentLang = document.getElementById('languageSelect').value;

                if (endpoint === '/predict') {
                    if (data.predicted_conditions) {
                        outputArea.innerHTML += `<h3>[${translateText('Predicted Conditions', currentLang)}]</h3>`;
                        data.predicted_conditions.forEach(item => {
                            outputArea.innerHTML += `<p>  • ${translateText(item.disease, currentLang)} (Confidence: ${item.confidence})</p>`;
                        });
                    }
                    if (data.recommendations) {
                        for (const key in data.recommendations) {
                            outputArea.innerHTML += `<h3>[${translateText(key, currentLang)}]</h3>`;
                            const value = data.recommendations[key];
                            // Handle lists coming from API (symptoms, precautions, diets, meds, workout)
                            if (Array.isArray(value)) {
                                outputArea.innerHTML += value.map(item => `  • ${translateText(item, currentLang)}`).join('<br/>');
                            } else {
                                outputArea.innerHTML += formatAsList(value, currentLang);
                            }
                            outputArea.innerHTML += '<br/>';
                        }
                    }
                    if (data.advice) {
                        outputArea.innerHTML += `<p class="warning-message">${translateText(data.advice, currentLang)}</p>`;
                    }
                } else if (endpoint === '/recommend') {
                    if (data.recommendations) {
                        for (const key in data.recommendations) {
                            outputArea.innerHTML += `<h3>[${translateText(key, currentLang)}]</h3>`;
                            const value = data.recommendations[key];
                            if (Array.isArray(value)) {
                                outputArea.innerHTML += value.map(item => `  • ${translateText(item, currentLang)}`).join('<br/>');
                            } else {
                                outputArea.innerHTML += formatAsList(value, currentLang);
                            }
                            outputArea.innerHTML += '<br/>';
                        }
                    }
                    if (data.advice) {
                        outputArea.innerHTML += `<p class="warning-message">${translateText(data.advice, currentLang)}</p>`;
                    }
                } else if (endpoint === '/chat') {
                    outputArea.innerHTML += `<p><strong>Bot:</strong> ${translateText(data.response, currentLang)}</p>`;
                }

            } catch (error) {
                outputArea.textContent = `Request failed: ${error.message}`;
                outputArea.classList.add('error-message');
                console.error('Network or other error:', error);
            }
        }

        function validateAccess(outputElementId) {
            const userAge = parseInt(document.getElementById('ageInput').value);
            const userRole = document.getElementById('roleInput').value;
            const userId = document.getElementById('idInput').value;
            const currentLang = document.getElementById('languageSelect').value;
            const outputArea = document.getElementById(outputElementId);

            outputArea.innerHTML = '';
            outputArea.classList.remove('error-message', 'warning-message');

            if (userAge < 18) {
                outputArea.textContent = translateText('Access Denied: Information is not available for users under 18.', currentLang);
                outputArea.classList.add('error-message');
                return false;
            }

            if (userRole === 'Student' && userId !== '1111') {
                outputArea.textContent = translateText('Access Denied: Invalid ID for Student role.', currentLang);
                outputArea.classList.add('error-message');
                return false;
            }
            if (userRole === 'Doctor' && userId !== '0000') {
                outputArea.textContent = translateText('Access Denied: Invalid ID for Doctor role.', currentLang);
                outputArea.classList.add('error-message');
                return false;
            }
            return true;
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', async () => {
            // Initial loads
            await fetchTranslations();
            await fetchDiseaseNames();
            await fetchTranslatedDiseaseNames(document.getElementById('languageSelect').value);
            updateUI(document.getElementById('languageSelect').value);
            showTab('predict');

            document.querySelectorAll('.tab-button').forEach(button => {
                button.addEventListener('click', () => {
                    showTab(button.dataset.tab);
                });
            });

            document.getElementById('languageSelect').addEventListener('change', async (event) => {
                const newLang = event.target.value;
                await fetchTranslatedDiseaseNames(newLang);
                updateUI(newLang);
            });

            document.getElementById('roleInput').addEventListener('change', (event) => {
                const selectedRole = event.target.value;
                const idInputLabel = document.getElementById('idInputLabel');
                const idInput = document.getElementById('idInput');
                if (selectedRole === 'Student' || selectedRole === 'Doctor') {
                    idInputLabel.style.display = 'block';
                    idInput.style.display = 'block';
                    idInput.value = ''; // Clear ID on role change
                } else {
                    idInputLabel.style.display = 'none';
                    idInput.style.display = 'none';
                    idInput.value = '';
                }
            });

            document.getElementById('predictBtn').addEventListener('click', () => {
                if (!validateAccess('predictOutput')) return;
                const symptoms = document.getElementById('predictInput').value;
                const userAge = parseInt(document.getElementById('ageInput').value);
                const userRole = document.getElementById('roleInput').value;
                const currentLang = document.getElementById('languageSelect').value;

                if (!symptoms.trim()) {
                    document.getElementById('predictOutput').textContent = translateText('Please enter symptoms.', currentLang);
                    document.getElementById('predictOutput').classList.add('error-message');
                    return;
                }

                handleApiCall('/predict', 'POST', {
                    symptoms: symptoms,
                    age: userAge,
                    role: userRole,
                    language: currentLang
                }, 'predictOutput');
            });

            document.getElementById('predictClearBtn').addEventListener('click', () => {
                document.getElementById('predictInput').value = '';
                document.getElementById('predictOutput').innerHTML = '';
                document.getElementById('predictOutput').classList.remove('error-message', 'warning-message');
            });

            document.getElementById('recBtn').addEventListener('click', () => {
                if (!validateAccess('recOutput')) return;
                const disease = document.getElementById('recInput').value;
                const userAge = parseInt(document.getElementById('ageInput').value);
                const userRole = document.getElementById('roleInput').value;
                const currentLang = document.getElementById('languageSelect').value;

                handleApiCall('/recommend', 'POST', {
                    disease: disease,
                    age: userAge,
                    role: userRole,
                    language: currentLang
                }, 'recOutput');
            });

            document.getElementById('recClearBtn').addEventListener('click', () => {
                document.getElementById('recInput').selectedIndex = 0; // Reset to first option
                document.getElementById('recOutput').innerHTML = '';
                document.getElementById('recOutput').classList.remove('error-message', 'warning-message');
            });

            document.getElementById('chatBtn').addEventListener('click', () => {
                if (!validateAccess('chatOutput')) return;
                const query = document.getElementById('chatInput').value;
                const userAge = parseInt(document.getElementById('ageInput').value);
                const userRole = document.getElementById('roleInput').value;
                const currentLang = document.getElementById('languageSelect').value;

                if (!query.trim()) {
                    document.getElementById('chatOutput').textContent = translateText('Please enter a query.', currentLang);
                    document.getElementById('chatOutput').classList.add('error-message');
                    return;
                }

                handleApiCall('/chat', 'POST', {
                    query: query,
                    age: userAge,
                    role: userRole,
                    language: currentLang
                }, 'chatOutput');
            });

            document.getElementById('chatClearBtn').addEventListener('click', () => {
                document.getElementById('chatInput').value = '';
                document.getElementById('chatOutput').innerHTML = '';
                document.getElementById('chatOutput').classList.remove('error-message', 'warning-message');
            });

            document.getElementById('clearAllBtn').addEventListener('click', () => {
                document.getElementById('predictInput').value = '';
                document.getElementById('predictOutput').innerHTML = '';
                document.getElementById('predictOutput').classList.remove('error-message', 'warning-message');

                document.getElementById('recInput').selectedIndex = 0;
                document.getElementById('recOutput').innerHTML = '';
                document.getElementById('recOutput').classList.remove('error-message', 'warning-message');

                document.getElementById('chatInput').value = '';
                document.getElementById('chatOutput').innerHTML = '';
                document.getElementById('chatOutput').classList.remove('error-message', 'warning-message');

                document.getElementById('ageInput').value = 25;
                document.getElementById('roleInput').value = 'Normal User';
                document.getElementById('idInput').value = '';
                document.getElementById('idInputLabel').style.display = 'none';
                document.getElementById('idInput').style.display = 'none';
                document.getElementById('languageSelect').value = 'English';
                updateUI('English'); // Reset UI to English
            });
        });
    </script>
</body>
</html>
